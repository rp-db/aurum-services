<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurum Security Services</title>
  <link rel="stylesheet" href="css/aurum.css">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background-image: url('images/swissalps.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.45) 0%,
        rgba(0, 0, 0, 0.30) 50%,
        rgba(0, 0, 0, 0.55) 100%
      );
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      color: #ffffff;
      padding: 2rem;
      max-width: 700px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #f5e9c9;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
      margin-bottom: 0.6em;
    }

    h2 {
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #e8dfc8;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.5);
      margin-bottom: 1.6em;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: rgba(245, 233, 201, 0.6);
      margin: 0 auto 1.6em;
    }

    h3 {
      font-size: clamp(0.75rem, 1.8vw, 1rem);
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #c8bfa8;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <div class="content">
    <h1>Aurum Security Services</h1>
    <h2>Individual Digital Protection</h2>
    <div class="divider"></div>
    <h3>Made in Switzerland</h3>
  </div>
</body>
</html>
